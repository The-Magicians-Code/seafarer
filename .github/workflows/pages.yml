name: Build and deploy thesis site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Estonian thesis
        uses: xu-cheng/latex-action@v3
        with:
          working_directory: faithful
          root_file: main.tex
          latexmk_use_lualatex: false
          latexmk_shell_escape: false

      - name: Build English thesis
        uses: xu-cheng/latex-action@v3
        with:
          working_directory: faithful-en
          root_file: main.tex
          latexmk_use_lualatex: false
          latexmk_shell_escape: false

      - name: Stage publish directory
        run: |
          mkdir -p publish
          cp docs/index.html publish/
          cp faithful/main.pdf publish/thesis-et.pdf
          cp faithful-en/main.pdf publish/thesis-en.pdf

      - uses: actions/upload-pages-artifact@v3
        with:
          path: publish/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
