name: Build and deploy thesis site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Estonian thesis (PDF)
        uses: xu-cheng/latex-action@v3
        with:
          working_directory: faithful
          root_file: main.tex
          latexmk_use_lualatex: false
          latexmk_shell_escape: false

      - name: Build English thesis (PDF)
        uses: xu-cheng/latex-action@v3
        with:
          working_directory: faithful-en
          root_file: main.tex
          latexmk_use_lualatex: false
          latexmk_shell_escape: false

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        working-directory: web
        run: npm ci

      - name: Build Astro site
        working-directory: web
        run: npm run build

      - name: Stage publish directory
        run: |
          # The interactive Astro site is the landing page (served under
          # /seafarer/). The embedded-PDF fallback lives at /seafarer/pdf/.
          mkdir -p publish
          cp -r web/dist/. publish/
          mkdir -p publish/pdf
          cp faithful/main.pdf publish/pdf/thesis-et.pdf
          cp faithful-en/main.pdf publish/pdf/thesis-en.pdf

      - uses: actions/upload-pages-artifact@v3
        with:
          path: publish/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
